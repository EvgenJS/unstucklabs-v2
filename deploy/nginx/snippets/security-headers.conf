# Shared security headers, included by every server block in deploy/nginx/.
# Baseline hardening -- not a full CSP (each app's own script/style sources
# differ too much to share one policy here without either breaking something
# or being so loose it's not worth having).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Forces HTTPS on every subsequent visit for two years, covering every
# *.unstucklabs.store subdomain -- without this, a user's very first
# connection (or any visit after a cache clear) could be intercepted and
# downgraded to plain HTTP before the redirect-to-HTTPS block ever runs,
# exposing the refresh-token cookie in transit.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
