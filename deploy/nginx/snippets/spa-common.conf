# Shared directives for the three static mini-app builds (unstuck-daily,
# habitflow, fishcast). Included by their server blocks -- each block only
# needs to set `root` to its own dist/ before including this.
index index.html;

# Vite fingerprints filenames under assets/ (content hash in the name), so
# these can be cached forever -- a new deploy always ships new filenames.
location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

# Everything else -- index.html, sw.js, workbox-*.js, manifest.webmanifest,
# icons -- is referenced by a fixed (non-hashed) name, so it must NOT be
# cached long: a stale sw.js or index.html silently strands installed PWA
# users on an old build. try_files falls back to index.html for any
# unmatched path (defensive; none of these apps use client-side routing
# today, but costs nothing to have).
location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
}
