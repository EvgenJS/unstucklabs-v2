# proxy_cache_path is only valid in the http{} context, which none of the
# per-site files in deploy/nginx/ are (they're included from sites-enabled/,
# inside http{} but as server{} blocks, not at the top level). This file
# must be included once, directly inside http{} -- typically by adding this
# line to /etc/nginx/nginx.conf's http block:
#
#   include /etc/nginx/snippets/store-cache-zone.conf;
#
# This is a manual, one-time step (see deploy/DEPLOYMENT.md) rather than
# something deploy automation touches, since nginx.conf is shared with
# whatever else runs on the box and isn't repo-tracked.
proxy_cache_path /var/cache/nginx/store levels=1:2 keys_zone=store_cache:10m max_size=100m inactive=60m use_temp_path=off;
