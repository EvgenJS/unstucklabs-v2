# Shared reverse-proxy directives for the three Node processes PM2 manages
# (store, admin, core-api). Included by their respective server blocks.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# Fastify/Next.js need this to know the original request was HTTPS -- both
# the refresh cookie's `secure` flag logic and Next's own URL generation
# depend on it. Without it, everything looks like plain HTTP to the app.
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection "";
proxy_read_timeout 60s;
