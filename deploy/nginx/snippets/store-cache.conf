# Short-lived cache for Store's two live-pricing pages (/ and /apps), which
# are `force-dynamic` in Next.js (see the comment in apps/store/app/page.tsx)
# -- they re-render per request rather than being statically generated, so
# without this every hit re-runs the full request including the catalog
# fetch to core-api. 30s is short enough that a price change shows up
# almost immediately, long enough to absorb real traffic bursts.
# Requires store-cache-zone.conf's `store_cache` zone (see that file).
#
# Next.js sends `Cache-Control: private, no-cache, no-store, max-age=0,
# must-revalidate` on these routes (force-dynamic pages get Next's default
# no-store, not a specific choice made for this cache layer) -- proxy_cache
# honors that and refuses to cache at all unless told to ignore it.
# proxy_cache_valid below is the actual TTL that applies once it's ignored.
proxy_ignore_headers Cache-Control Expires Set-Cookie;
proxy_cache store_cache;
proxy_cache_valid 200 30s;
proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
proxy_cache_background_update on;
add_header X-Cache-Status $upstream_cache_status always;
