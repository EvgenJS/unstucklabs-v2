# HabitFlow -- static Vite/PWA build, no PM2 process. Served directly.

server {
    listen 80;
    listen [::]:80;
    server_name habitflow.unstucklabs.store;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name habitflow.unstucklabs.store;

    ssl_certificate     /etc/letsencrypt/live/habitflow.unstucklabs.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/habitflow.unstucklabs.store/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    root /var/www/unstucklabs-v2/apps/habitflow/dist;
    include /etc/nginx/snippets/spa-common.conf;
}
