# Admin panel -- proxies to Next.js via PM2 (127.0.0.1:3002). Role gating
# (OWNER/EDITOR/SUPPORT) already happens at the app layer (rbac.plugin.ts);
# an IP allowlist here is optional extra hardening, not a substitute for it.

server {
    listen 80;
    listen [::]:80;
    server_name admin.unstucklabs.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.unstucklabs.com;

    ssl_certificate     /etc/letsencrypt/live/admin.unstucklabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.unstucklabs.com/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    # Uncomment and fill in to restrict the admin panel to known IPs on top
    # of the app-layer role gate:
    # allow 203.0.113.10;
    # deny all;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3002;
    }
}
