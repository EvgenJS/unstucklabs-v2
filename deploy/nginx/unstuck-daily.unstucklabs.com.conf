# Unstuck Daily -- static Vite/PWA build, no PM2 process. Served directly.

server {
    listen 80;
    listen [::]:80;
    server_name unstuck-daily.unstucklabs.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name unstuck-daily.unstucklabs.com;

    ssl_certificate     /etc/letsencrypt/live/unstuck-daily.unstucklabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unstuck-daily.unstucklabs.com/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    root /var/www/unstucklabs-v2/apps/unstuck-daily/dist;
    include /etc/nginx/snippets/spa-common.conf;
}
