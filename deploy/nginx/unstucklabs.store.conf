# Store (apex domain) -- proxies to Next.js via PM2 (127.0.0.1:3000).
# Canonicalizes www -> apex.
#
# Deploy path assumed below: /var/www/unstucklabs-v2 (adjust to wherever
# the repo is actually checked out on the server -- see deploy/DEPLOYMENT.md).

server {
    listen 80;
    listen [::]:80;
    server_name unstucklabs.store www.unstucklabs.store;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://unstucklabs.store$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.unstucklabs.store;

    ssl_certificate     /etc/letsencrypt/live/unstucklabs.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unstucklabs.store/privkey.pem;

    return 301 https://unstucklabs.store$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name unstucklabs.store;

    ssl_certificate     /etc/letsencrypt/live/unstucklabs.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unstucklabs.store/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3000;
    }
}
