# core-api -- proxies to Fastify via PM2 (127.0.0.1:3001). Also serves
# /uploads/* (product media, catch photos) -- core-api's own static plugin
# handles that already, nginx just needs to get requests to it.
#
# client_max_body_size matches product-media.admin.routes.ts's own
# MAX_VIDEO_BYTES (200MB) -- nginx's 1MB default would otherwise reject
# a large video upload before Fastify ever sees it.

server {
    listen 80;
    listen [::]:80;
    server_name api.unstucklabs.store;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.unstucklabs.store;

    ssl_certificate     /etc/letsencrypt/live/api.unstucklabs.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.unstucklabs.store/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 200M;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3001;
    }
}
